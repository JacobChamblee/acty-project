version: "3.9"
# Acty full-stack development environment
#
# Usage:
#   docker compose up -d              # start full stack
#   docker compose up -d api postgres # start API + DB only
#   docker compose logs -f api        # tail API logs
#   docker compose down -v            # stop + remove volumes
#
# Notes:
#   - Ollama runs natively on 4U DIY (RTX 3060, 192.168.68.138) — not in Docker
#   - RAG server also runs natively on 4U via systemd (acty-rag.service)
#   - Expo mobile app runs natively on phone/emulator — not in Docker
#   - Copy .env.example → .env and fill in secrets before first run

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: acty-api
    ports:
      - "8765:8765"
    environment:
      # Inference node (4U DIY)
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.68.138:11434}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.68.138:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - OLLAMA_FAST_MODEL=${OLLAMA_FAST_MODEL:-phi4-mini}
      # RAG server (4U DIY)
      - RAG_BASE_URL=${RAG_BASE_URL:-http://192.168.68.138:8766}
      # Database
      - DATABASE_URL=postgresql://acty:acty@postgres:5432/acty
      # OBD data
      - ACTY_HOST=0.0.0.0
      - ACTY_PORT=8765
      - ACTY_CSV_DIR=/data
      # ML models
      - ACTY_MODEL_DIR=/models
      # Anthropic API (cloud fallback)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Privacy
      - DP_EPSILON=${DP_EPSILON:-1.0}
      - ZK_TOKEN_SEED=${ZK_TOKEN_SEED}
    volumes:
      - ./data:/data                  # OBD CSV sessions
      - ./backend:/app/backend        # live reload in dev
      - model_cache:/models           # per-vehicle ML models
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - acty-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: acty-postgres
    environment:
      POSTGRES_USER:     acty
      POSTGRES_PASSWORD: acty
      POSTGRES_DB:       acty
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acty"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - acty-net

  # ── Grafana dashboard ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: acty-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-acty}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-postgresql-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - acty-net

  # ── pgAdmin (optional, debug only) ───────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: acty-pgadmin
    profiles: ["debug"]
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@acty.local
      PGADMIN_DEFAULT_PASSWORD: acty
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - acty-net

# ── volumes ───────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  grafana_data:
    driver: local
  model_cache:
    driver: local

# ── networks ──────────────────────────────────────────────────────────────────
networks:
  acty-net:
    driver: bridge
